<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking Manager - Australia Trip Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-purple-400 via-pink-500 to-red-600 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <a href="/" class="text-white hover:text-purple-200 mb-4 inline-block">
                <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
            </a>
            <h1 class="text-4xl font-bold text-white mb-2">
                <i class="fas fa-ticket-alt mr-4"></i>Booking Manager
            </h1>
            <button id="add-booking-btn" class="bg-white text-purple-600 py-2 px-4 rounded-md hover:bg-gray-100 mt-4">
                <i class="fas fa-plus mr-2"></i>Add New Booking
            </button>
        </header>
        
        <div id="bookings-list" class="grid gap-6">
            <!-- Bookings will be loaded here -->
        </div>
        
        <!-- Booking Modal -->
        <div id="booking-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center">
            <div class="bg-white rounded-xl p-8 max-w-md w-full mx-4">
                <h3 class="text-xl font-semibold mb-4" id="modal-title">Add Booking</h3>
                <form id="booking-form">
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Type</label>
                        <select name="type" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                            <option value="flight">Flight</option>
                            <option value="hotel">Hotel</option>
                            <option value="tour">Tour/Activity</option>
                            <option value="transport">Transport</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
                        <input type="text" name="description" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                        <input type="date" name="date" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Cost (AUD)</label>
                        <input type="number" name="cost" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-md" required>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Confirmation #</label>
                        <input type="text" name="confirmation" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                        <textarea name="notes" class="w-full px-3 py-2 border border-gray-300 rounded-md" rows="3"></textarea>
                    </div>
                    <div class="flex justify-end space-x-2">
                        <button type="button" id="cancel-btn" class="bg-gray-300 text-gray-700 py-2 px-4 rounded-md">Cancel</button>
                        <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded-md">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentBookingId = null;
        
        async function loadBookings() {
            try {
                const response = await fetch('/api/bookings');
                const bookings = await response.json();
                displayBookings(bookings);
            } catch (error) {
                console.error('Error loading bookings:', error);
            }
        }
        
        function displayBookings(bookings) {
            const container = document.getElementById('bookings-list');
            container.innerHTML = bookings.map(booking => `
                <div class="bg-white/90 backdrop-blur-sm rounded-xl p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-800">${booking.description}</h3>
                            <p class="text-sm text-gray-600">${booking.type} • ${booking.date}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-lg font-bold text-green-600">$${booking.cost}</p>
                            <button onclick="editBooking(${booking.id})" class="text-blue-600 hover:text-blue-800 mr-2">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button onclick="deleteBooking(${booking.id})" class="text-red-600 hover:text-red-800">
                                <i class="fas fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    ${booking.confirmation ? `<p class="text-sm text-gray-600">Confirmation: ${booking.confirmation}</p>` : ''}
                    ${booking.notes ? `<p class="text-sm text-gray-600 mt-2">${booking.notes}</p>` : ''}
                </div>
            `).join('');
        }
        
        document.getElementById('add-booking-btn').addEventListener('click', () => {
            currentBookingId = null;
            document.getElementById('modal-title').textContent = 'Add Booking';
            document.getElementById('booking-form').reset();
            document.getElementById('booking-modal').classList.remove('hidden');
        });
        
        document.getElementById('cancel-btn').addEventListener('click', () => {
            document.getElementById('booking-modal').classList.add('hidden');
        });
        
        document.getElementById('booking-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            data.cost = parseFloat(data.cost);
            
            if (currentBookingId) {
                data.id = currentBookingId;
            }
            
            try {
                const response = await fetch('/api/bookings', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    document.getElementById('booking-modal').classList.add('hidden');
                    loadBookings();
                }
            } catch (error) {
                console.error('Error saving booking:', error);
            }
        });
        
        function editBooking(id) {
            // Implementation for editing (similar to add)
            alert('Edit functionality can be implemented similarly to add');
        }
        
        async function deleteBooking(id) {
            if (confirm('Delete this booking?')) {
                try {
                    const response = await fetch(`/api/bookings/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        loadBookings();
                    }
                } catch (error) {
                    console.error('Error deleting booking:', error);
                }
            }
        }
        
        loadBookings();
    </script>
</body>
</html>
