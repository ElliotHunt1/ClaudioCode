<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Calculator - Australia Trip Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-green-400 via-blue-500 to-purple-600 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <a href="/" class="text-white hover:text-blue-200 mb-4 inline-block">
                <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
            </a>
            <h1 class="text-4xl font-bold text-white mb-2">
                <i class="fas fa-calculator mr-4"></i>Budget Calculator
            </h1>
        </header>
        
        <div class="max-w-2xl mx-auto bg-white/90 backdrop-blur-sm rounded-xl p-8">
            <form id="budget-form" class="space-y-6">
                <div class="grid md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Currency</label>
                        <select name="currency" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="AUD" selected>AUD (Australian Dollar)</option>
                            <option value="USD">USD (US Dollar)</option>
                            <option value="EUR">EUR (Euro)</option>
                            <option value="GBP">GBP (British Pound)</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-plane mr-2"></i>Flights
                        </label>
                        <input type="number" name="flights" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-bed mr-2"></i>Accommodation
                        </label>
                        <input type="number" name="accommodation" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-utensils mr-2"></i>Food & Dining
                        </label>
                        <input type="number" name="food" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-camera mr-2"></i>Activities & Tours
                        </label>
                        <input type="number" name="activities" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-bus mr-2"></i>Local Transport
                        </label>
                        <input type="number" name="transport" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">
                            <i class="fas fa-shopping-bag mr-2"></i>Miscellaneous
                        </label>
                        <input type="number" name="misc" step="0.01" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="0.00">
                    </div>
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 transition duration-200">
                    <i class="fas fa-calculator mr-2"></i>Calculate Budget
                </button>
            </form>
            
            <div id="budget-results" class="mt-8 hidden">
                <h3 class="text-xl font-semibold text-gray-800 mb-4">Budget Summary</h3>
                <div class="bg-gray-50 rounded-lg p-4 space-y-2">
                    <div class="flex justify-between">
                        <span>Selected Currency Subtotal:</span>
                        <span id="subtotal" class="font-medium">$0.00</span>
                    </div>
                    <div class="flex justify-between">
                        <span>10% Contingency:</span>
                        <span id="contingency" class="font-medium">$0.00</span>
                    </div>
                    <div class="flex justify-between">
                        <span>Total Estimated Cost:</span>
                        <span id="total" class="text-blue-600">$0.00</span>
                    </div>
                    <hr class="my-2">
                    <div class="flex justify-between text-sm text-gray-600">
                        <span>Converted to AUD:</span>
                        <span id="total-aud" class="font-medium">AUD 0.00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('budget-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const response = await fetch('/api/budget/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await response.json();
                
                const currency = result.currency || 'AUD';
                const symbol = currency === 'USD' ? '$' : currency === 'EUR' ? '€' : currency === 'GBP' ? '£' : 'A$';

                document.getElementById('subtotal').textContent = `${symbol}${result.subtotal}`;
                document.getElementById('contingency').textContent = `${symbol}${result.contingency}`;
                document.getElementById('total').textContent = `${symbol}${result.total}`;
                document.getElementById('total-aud').textContent = `AUD ${result.total_aud}`;
                document.getElementById('budget-results').classList.remove('hidden');
            } catch (error) {
                console.error('Error calculating budget:', error);
            }
        });
    </script>
</body>
</html>
