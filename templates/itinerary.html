<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerary Planner - Australia Trip Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-gradient-to-br from-orange-400 via-red-500 to-pink-600 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <header class="text-center mb-8">
            <a href="/" class="text-white hover:text-orange-200 mb-4 inline-block">
                <i class="fas fa-arrow-left mr-2"></i>Back to Dashboard
            </a>
            <h1 class="text-4xl font-bold text-white mb-2">
                <i class="fas fa-map-marked-alt mr-4"></i>21-Day Itinerary
            </h1>
        </header>
        
        <div class="grid gap-6">
            {% for day in itinerary %}
            <div class="bg-white/90 backdrop-blur-sm rounded-xl p-6">
                <h3 class="text-xl font-semibold text-gray-800 mb-4">Day {{ day.day }}</h3>
                <form class="itinerary-form" data-day="{{ day.day }}">
                    <div class="grid md:grid-cols-2 gap-4 mb-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Date</label>
                            <input type="date" name="date" value="{{ day.date }}" class="w-full px-3 py-2 border border-gray-300 rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Locations</label>
                            <input type="text" name="locations" value="{{ day.locations|join(', ') }}" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="Sydney, Blue Mountains">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Activities</label>
                        <input type="text" name="activities" value="{{ day.activities|join(', ') }}" class="w-full px-3 py-2 border border-gray-300 rounded-md" placeholder="Opera House tour, Harbour Bridge">
                    </div>
                    <div class="mb-4">
                        <label class="block text-sm font-medium text-gray-700 mb-1">Notes</label>
                        <textarea name="notes" class="w-full px-3 py-2 border border-gray-300 rounded-md" rows="2">{{ day.notes }}</textarea>
                    </div>
                    <button type="submit" class="bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700">
                        <i class="fas fa-save mr-2"></i>Save Day {{ day.day }}
                    </button>
                </form>
            </div>
            {% endfor %}
        </div>
    </div>

    <script>
        document.querySelectorAll('.itinerary-form').forEach(form => {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                const data = {
                    day: parseInt(e.target.dataset.day),
                    date: formData.get('date'),
                    locations: formData.get('locations').split(',').map(s => s.trim()),
                    activities: formData.get('activities').split(',').map(s => s.trim()),
                    notes: formData.get('notes')
                };
                
                try {
                    const response = await fetch('/api/itinerary/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });
                    if (response.ok) {
                        alert('Itinerary updated successfully!');
                    }
                } catch (error) {
                    console.error('Error updating itinerary:', error);
                }
            });
        });
    </script>
</body>
</html>
